name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: ansible/ansible-test-auth@main
      - name: Check out code
        uses: actions/checkout@v5
      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: 3.14
      - name: Install ansible-core
        run: pip install git+https://github.com/ansible/ansible.git@devel
      - name: Test GHA support
        run: ansible-test integration -v
        working-directory: ansible_collections/ansible/core

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        job:
          - J001
          - J002
          - J003
    steps:
      - uses: ansible/ansible-test-auth@main
      - name: Check out code
        uses: actions/checkout@v5
      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: 3.14
      - name: Install ansible-core
        run: pip install git+https://github.com/mattclay/ansible.git@at-gha2
      - name: Test GHA support
        run: cd ansible_collections/ansible/core && ansible-test integration -v --remote alpine/3.23 --remote-stage dev
